    <script>
        /**
         * MASTER CONFIG
         */
        const _0x_d = "{{ALLOWED_DOMAIN}}";
        const _0x_a = "aW1nMmFtLWxvbmctYm9yYQ==";
        const _p = ["https://", "api.", "counterapi", ".dev/v1/", "/visits/up"];

        let workspaceFiles = []; let convertedRegistry = []; let latestProcessedIds = [];
        let isLoaderActive = false;

        const formatSize = (b) => !b ? '0 B' : parseFloat((b / Math.pow(1024, Math.floor(Math.log(b) / Math.log(1024)))).toFixed(1)) + ' ' + ['B', 'KB', 'MB', 'GB'][Math.floor(Math.log(b) / Math.log(1024))];
        const getMeta = (f) => `${f.name}-${f.size}-${f.lastModified}`;

        window.onload = function () {
            const h = window.location.hostname;
            document.getElementById('copyYear').innerText = new Date().getFullYear();
            if (h === _0x_d || h === "localhost" || h === "127.0.0.1" || h.includes("github.io") || h === "www." + _0x_d) {
                document.getElementById('mainContent').classList.remove('opacity-0');
                document.getElementById('footer').classList.remove('opacity-0');
                initApp();
                const url = _p[0] + _p[1] + _p[2] + _p[3] + atob(_0x_a) + _p[4];
                fetch(url).then(r => r.json()).then(d => {
                    document.getElementById('vCount').innerText = "VISITOR: " + d.count.toLocaleString();
                }).catch(() => document.getElementById('vCount').innerText = "VISITOR: ONLINE");
            } else {
                document.body.innerHTML = "<div style='color:white;text-align:center;padding-top:20%'><h1>403 - Forbidden</h1><p>License restricted to " + _0x_d + "</p></div>";
            }
        };

        function initApp() {
            document.getElementById('qualityRange').oninput = (e) => document.getElementById('qualityVal').innerText = Math.round(e.target.value * 100) + "%";
            document.addEventListener('keydown', (e) => e.key === 'Escape' && closeLightbox());
            const dz = document.getElementById('dropzone');
            dz.addEventListener('dragenter', (e) => { e.preventDefault(); dz.classList.add('drag-over'); });
            dz.addEventListener('dragover', (e) => e.preventDefault());
            dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
            dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
            document.getElementById('imageInput').onchange = (e) => handleFiles(e.target.files);
            document.getElementById('processBtn').onclick = executeConversion;
            updateUI();
        }

        async function handleFiles(files) {
            const incoming = Array.from(files);
            let dupCount = 0;
            const supported = ['jpg', 'jpeg', 'png', 'webp', 'heic', 'heif', 'dng', 'tiff'];

            incoming.forEach(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if (!supported.includes(ext)) return;
                if (workspaceFiles.some(x => getMeta(x.file) === getMeta(f))) { dupCount++; }
                else { workspaceFiles.push({ id: Math.random().toString(36).substr(2, 9), file: f, status: 'pending', previewUrl: '', rotation: 0 }); }
            });

            if (dupCount > 0) {
                document.getElementById('duplicateMsg').innerText = `${dupCount} duplicate file(s) skipped.`;
                document.getElementById('simpleDuplicateModal').classList.remove('hidden');
            }
            document.getElementById('imageInput').value = '';
            updateUI();
            if (!isLoaderActive) runLoader();
        }

        async function runLoader() {
            isLoaderActive = true;
            for (let f of workspaceFiles) {
                if (!f.previewUrl) {
                    f.previewUrl = await genT(f.file);
                    const img = document.getElementById(`prev-${f.id}`);
                    if (img) { img.src = f.previewUrl; img.onload = () => img.classList.remove('opacity-0'); }
                }
            }
            isLoaderActive = false;
        }

        async function genT(file) {
            try {
                if (file.name.match(/\.(heic|heif)$/i)) {
                    const conv = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.1 });
                    return URL.createObjectURL(Array.isArray(conv) ? conv[0] : conv);
                }
                return URL.createObjectURL(file);
            } catch (e) { return ''; }
        }

        function rotateFile(id, dir) {
            const f = workspaceFiles.find(x => x.id === id);
            f.rotation = (f.rotation + (dir === 'right' ? 90 : -90)) % 360;
            const img = document.getElementById(`prev-${id}`);
            if (img) img.style.transform = `rotate(${f.rotation}deg)`;
        }

        function updateUI() {
            const grid = document.getElementById('queueGrid');
            grid.innerHTML = '';
            workspaceFiles.forEach(f => {
                const card = document.createElement('div');
                card.id = `card-${f.id}`;
                card.className = "flex flex-col cursor-pointer shadow-2xl animate-in group relative";
                card.onclick = () => openLightbox(f.previewUrl, f.file.name, formatSize(f.file.size));
                let dot = f.status === 'converted' ? 'bg-emerald-500' : (f.status === 'error' ? 'bg-red-500' : 'bg-orange-500');

                card.innerHTML = `
                    <div class="img-container">
                        <img id="prev-${f.id}" src="${f.previewUrl}" style="transform: rotate(${f.rotation}deg)" class="rotating ${f.previewUrl ? '' : 'opacity-0'}">
                        <div class="absolute inset-0 bg-blue-500/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><span class="text-[10px] font-black uppercase text-white italic">Preview</span></div>
                        <span class="absolute bottom-4 right-4 bg-slate-950/80 text-[7px] text-slate-300 px-2 py-0.5 rounded-full font-bold tabular-nums font-mono">${formatSize(f.file.size)}</span>
                        <div class="absolute top-4 left-4 w-2.5 h-2.5 rounded-full transition-all ${dot}"></div>
                    </div>
                    <div class="absolute top-4 right-4 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-all z-20">
                        <button onclick="event.stopPropagation(); rotateFile('${f.id}','left')" class="bg-slate-800 hover:bg-slate-700 text-white w-7 h-7 rounded-full text-xs font-bold font-mono text-center shadow-lg">↺</button>
                        <button onclick="event.stopPropagation(); rotateFile('${f.id}','right')" class="bg-slate-800 hover:bg-slate-700 text-white w-7 h-7 rounded-full text-xs font-bold font-mono text-center shadow-lg">↻</button>
                        <button onclick="event.stopPropagation(); removeFile('${f.id}')" class="bg-red-500 hover:bg-red-400 text-white w-7 h-7 rounded-full text-xs font-bold font-mono shadow-lg">✕</button>
                    </div>
                    <div class="mt-2 px-2 pb-4 mq-container"><div class="mq-content text-[8px] text-slate-500 uppercase font-bold italic tracking-widest text-center">${f.file.name}</div></div>`;
                grid.appendChild(card);
            });
            const ghost = document.createElement('div');
            ghost.className = "border-2 border-dashed border-slate-800/60 rounded-[2rem] aspect-square flex flex-col items-center justify-center aspect-square cursor-pointer hover:border-blue-500 transition-all";
            ghost.innerHTML = `<span class="text-3xl">+</span>`;
            ghost.onclick = () => document.getElementById('imageInput').click();
            grid.appendChild(ghost);

            const pending = workspaceFiles.filter(x => x.status === 'pending').length;
            document.getElementById('queueCount').innerText = workspaceFiles.length;
            document.getElementById('counterBadge').innerText = `${workspaceFiles.filter(x => x.status === 'converted').length} / ${workspaceFiles.length}`;
            document.getElementById('totalConvertedLabel').innerText = `${convertedRegistry.length} Converted`;
            document.getElementById('processBtn').disabled = pending === 0;
            document.getElementById('convertHelperText').className = (workspaceFiles.length > 0 && pending === 0) ? "text-[9px] text-center mt-3 text-slate-600 uppercase font-bold italic" : "hidden";
        }

        async function executeConversion() {
            const format = document.getElementById('formatSelect').value;
            const quality = parseFloat(document.getElementById('qualityRange').value);
            const scaleSetting = parseFloat(document.getElementById('scaleSelect').value);
            const targets = workspaceFiles.filter(f => f.status === 'pending');
            const ext = format === 'image/jpeg' ? 'jpg' : format.split('/')[1];

            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            latestProcessedIds = []; let done = 0; let errors = [];

            for (let f of targets) {
                done++;
                document.getElementById('currentFileName').innerText = f.file.name;
                try {
                    let b = f.file;
                    if (f.file.name.match(/\.(heic|heif)$/i)) {
                        const conv = await heic2any({ blob: f.file, toType: "image/jpeg" });
                        b = Array.isArray(conv) ? conv[0] : conv;
                    }
                    if (f.file.name.match(/\.(dng|tiff)$/i)) {
                        const ab = await f.file.arrayBuffer(); const ifds = UTIF.decode(ab); UTIF.decodeImage(ab, ifds[0]);
                        const cvs = document.createElement('canvas'); cvs.width = ifds[0].width; cvs.height = ifds[0].height;
                        cvs.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(UTIF.toRGBA8(ifds[0]).buffer), cvs.width, cvs.height), 0, 0);
                        b = await new Promise(r => cvs.toBlob(r, 'image/jpeg'));
                    }

                    const comp = await imageCompression(new File([b], f.file.name, { type: format }), {
                        maxSizeMB: 10, maxWidthOrHeight: 10000,
                        onProgress: (p) => {
                            document.getElementById('fileProgressBar').style.width = p + '%';
                            document.getElementById('fileProgressText').innerText = p + '%';
                            const overall = Math.round(((done - 1) / targets.length) * 100 + (p / targets.length));
                            document.getElementById('progressBar').style.width = overall + '%';
                            document.getElementById('statusPercent').innerText = overall + '%';
                        }
                    });

                    const bit = await createImageBitmap(comp);

                    // MOBILE SAFETY LAYER: Check Megapixel Limit (MAX ~18MP for stability)
                    let scale = scaleSetting;
                    const isPortrait = Math.abs(f.rotation) === 90 || Math.abs(f.rotation) === 270;
                    const w = bit.width * scale;
                    const h = bit.height * scale;
                    const mp = (w * h) / 1000000;

                    // Most mobile devices top out at 16-20MP in canvas. Let's cap at 18MP.
                    if (mp > 18) {
                        scale = Math.sqrt(18000000 / (bit.width * bit.height));
                    }

                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d', { alpha: false });
                    const sw = bit.width * scale;
                    const sh = bit.height * scale;

                    canvas.width = isPortrait ? sh : sw;
                    canvas.height = isPortrait ? sw : sh;

                    ctx.fillStyle = "#000";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    ctx.rotate((f.rotation * Math.PI) / 180);
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(bit, -sw / 2, -sh / 2, sw, sh);

                    const final = await new Promise(r => canvas.toBlob(r, format, quality));
                    const name = `${f.file.name.split('.').slice(0, -1).join('.')}_${f.id}_final.${ext}`;

                    // Memory Flush
                    canvas.width = 0; canvas.height = 0;

                    f.status = 'converted';
                    convertedRegistry.push({ name, blob: final, id: f.id });
                    latestProcessedIds.push(f.id);
                    appendR(final, name);
                    updateUI();
                } catch (e) {
                    f.status = 'error';
                    errors.push(f.file.name + " (Reason: Resolution too high for device memory)");
                    updateUI();
                }
            }
            if (errors.length > 0) {
                document.getElementById('errorFileList').innerText = errors.join('\n');
                document.getElementById('errorReportModal').classList.remove('hidden');
            }
            document.getElementById('statusLabel').innerText = "All Files Synthesized";
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('statusPercent').innerText = '100%';
            document.getElementById('processBtn').disabled = false;
        }

        function appendR(b, n) {
            const url = URL.createObjectURL(b);
            const grid = document.getElementById('resultsGrid');
            const card = document.createElement('div');
            card.className = "flex flex-col group cursor-pointer shadow-2xl animate-in relative";
            card.onclick = () => openLightbox(url, n, formatSize(b.size));
            card.innerHTML = `
                <div class="img-container">
                    <img src="${url}">
                    <div class="absolute inset-0 bg-emerald-500/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity"><span class="text-[10px] font-black uppercase text-slate-950 italic">Preview</span></div>
                    <span class="absolute bottom-4 right-4 bg-emerald-500 text-[7px] text-slate-950 px-2 py-0.5 rounded-full font-black shadow-lg font-mono">${formatSize(b.size)}</span>
                </div>
                <div class="p-5 bg-slate-950 flex flex-col gap-4 overflow-hidden rounded-b-[2rem]">
                    <div class="mq-container"><div class="mq-content text-[9px] text-slate-500 font-bold uppercase text-center italic tracking-widest">${n}</div></div>
                    <a href="${url}" download="${n}" onclick="event.stopPropagation()" class="bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-black text-[9px] uppercase py-3 rounded-2xl text-center transition-all shadow-lg tracking-widest">Save Image</a>
                </div>`;
            grid.appendChild(card);
        }

        window.removeFile = (id) => { workspaceFiles = workspaceFiles.filter(f => f.id !== id); updateUI(); };
        window.clearQueue = () => { workspaceFiles = []; updateUI(); };
        window.resetWorkspace = () => { workspaceFiles = []; convertedRegistry = []; document.getElementById('resultsGrid').innerHTML = ''; document.getElementById('resultsSection').classList.add('hidden'); document.getElementById('progressContainer').classList.add('hidden'); updateUI(); };
        window.openLightbox = (url, n, s) => { if (!url) return; document.getElementById('lightboxImg').src = url; document.getElementById('lightboxName').innerText = n; document.getElementById('lightboxSize').innerText = s; document.getElementById('lightbox').classList.remove('hidden'); document.body.classList.add('lightbox-active'); };
        window.closeLightbox = () => { document.getElementById('lightbox').classList.add('hidden'); document.body.classList.remove('lightbox-active'); };

        document.getElementById('downloadAllBtn').onclick = async () => { const zip = new JSZip(); convertedRegistry.forEach(f => zip.file(f.name, f.blob)); const c = await zip.generateAsync({ type: "blob" }); const l = document.createElement('a'); l.href = URL.createObjectURL(c); l.download = `img2am_collection.zip`; l.click(); };
        document.getElementById('downloadLatestBtn').onclick = async () => { const zip = new JSZip(); convertedRegistry.filter(r => latestProcessedIds.includes(r.id)).forEach(f => zip.file(f.name, f.blob)); const c = await zip.generateAsync({ type: "blob" }); const l = document.createElement('a'); l.href = URL.createObjectURL(c); l.download = `img2am_batch.zip`; l.click(); };


        // --- LEGAL LOGIC FOR ADSENSE APPROVAL ---
        const legalData = {
            privacy: `
        <h2 class="text-white text-lg font-bold uppercase italic">Privacy Policy</h2>
        <p>Your privacy is our priority. <strong>img2am</strong> is a client-side tool, meaning all image processing happens directly in your browser. We never upload, store, or see your images.</p>
        
        <h3 class="text-white font-bold uppercase mt-4">Cookies & Advertising</h3>
        <p>We use Google AdSense to serve ads. Google uses cookies to serve ads based on your prior visits to this website or other websites. Google's use of advertising cookies enables it and its partners to serve ads based on your visit to our site and/or other sites on the Internet.</p>
        
        <h3 class="text-white font-bold uppercase mt-4">Opt-Out</h3>
        <p>You may opt out of personalized advertising by visiting <a href="https://www.google.com/settings/ads" target="_blank" class="text-blue-400 underline">Ads Settings</a>.</p>
        
        <h3 class="text-white font-bold uppercase mt-4">Third-Party Tools</h3>
        <p>We use CounterAPI to track visitor numbers. No personal identification is stored during this process.</p>
    `,
            terms: `
        <h2 class="text-white text-lg font-bold uppercase italic">Terms of Service</h2>
        <p>By using <strong>img2am</strong>, you agree to the following terms:</p>
        
        <ul class="list-disc ml-4 space-y-2">
            <li>The tool is provided "as is" without any warranties.</li>
            <li>You are responsible for the images you process.</li>
            <li>We are not liable for any data loss or browser crashes resulting from processing extremely large files.</li>
            <li>Usage of this tool is free, supported by non-intrusive advertising.</li>
        </ul>
        
        <p class="mt-4">This tool was created by <strong>long-bora</strong> for the global creative community.</p>
    `
        };

        function openLegal(type) {
            document.getElementById('legalContent').innerHTML = legalData[type];
            document.getElementById('legalModal').classList.remove('hidden');
            document.body.classList.add('lightbox-active');
        }

        function closeLegal() {
            document.getElementById('legalModal').classList.add('hidden');
            document.body.classList.remove('lightbox-active');
        }
    </script>
