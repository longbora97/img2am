name: Deploy Protected img2am
on:
  push:
    branches: ["main"]

# This part is CRITICAL for the "GitHub Actions" source to work
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Domain Lock
        run: |
          # This swaps the placeholder for your real domain in the background
          sed -i "s/{{ALLOWED_DOMAIN}}/${{ secrets.MY_DOMAIN }}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4